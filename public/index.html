<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>刷题工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; min-height: 100dvh; }

/* ===== Login ===== */
.login { max-width: 400px; margin: 0 auto; padding: 60px 20px 20px; text-align: center; }
.login h1 { font-size: 24px; margin-bottom: 8px; }
.login .sub { color: #999; font-size: 14px; margin-bottom: 40px; }
.login input { width: 100%; padding: 16px; font-size: 17px; border: 2px solid #e0e0e0; border-radius: 12px; outline: none; text-align: center; background: #fff; transition: border-color .2s; }
.login input:focus { border-color: #4a90d9; }
.login button { width: 100%; padding: 16px; margin-top: 16px; font-size: 17px; border: none; border-radius: 12px; background: #4a90d9; color: #fff; cursor: pointer; font-weight: 500; }
.login button:active { transform: scale(0.98); }
.login .error { color: #d9534f; font-size: 14px; margin-top: 12px; display: none; }
.login .hint { color: #bbb; font-size: 13px; margin-top: 24px; line-height: 1.8; }

/* ===== Menu ===== */
.menu { max-width: 500px; margin: 0 auto; padding: 32px 16px; text-align: center; }
.menu h1 { font-size: 24px; margin-bottom: 8px; }
.menu .user-info { color: #999; font-size: 13px; margin-bottom: 24px; line-height: 1.8; }
.menu .user-info .code { color: #4a90d9; }
.menu button { display: block; width: 100%; padding: 15px; margin-bottom: 10px; font-size: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 500; -webkit-appearance: none; }
.menu button:active { transform: scale(0.98); }
.btn-seq { background: #4a90d9; color: #fff; }
.btn-rand { background: #5cb85c; color: #fff; }
.btn-wrong { background: #f0ad4e; color: #fff; }
.btn-star { background: #9b59b6; color: #fff; }
.btn-fill { background: #17a2b8; color: #fff; }
.btn-fill-wrong { background: #e67e22; color: #fff; }
.btn-search { background: #6c757d; color: #fff; }
.btn-clear { background: #d9534f; color: #fff; font-size: 14px; padding: 12px; margin-top: 8px; }
.btn-clear.confirm { background: #c9302c; }
.btn-logout { background: none; color: #999; font-size: 14px; padding: 10px; border: 1px solid #ddd !important; margin-top: 8px; }
.menu button:disabled { opacity: 0.4; }

/* ===== Quiz ===== */
.quiz { max-width: 500px; margin: 0 auto; padding: 12px; padding-bottom: 130px; }
.progress-bar { background: #e0e0e0; height: 4px; border-radius: 2px; margin-bottom: 8px; overflow: hidden; position: sticky; top: 0; z-index: 10; }
.progress-fill { height: 100%; background: #4a90d9; transition: width .3s; }
.progress-fill.star { background: #9b59b6; }
.progress-fill.fill { background: #17a2b8; }
.progress-text { font-size: 13px; color: #999; margin-bottom: 12px; display: flex; justify-content: space-between; }

.q-header { margin-bottom: 12px; }
.q-type { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; color: #fff; margin-bottom: 8px; }
.type-single { background: #4a90d9; }
.type-multi { background: #f0ad4e; }
.type-judge { background: #5cb85c; }
.type-fill { background: #9b59b6; }
.q-stem { font-size: 17px; line-height: 1.7; color: #222; }

.options { list-style: none; margin: 12px 0; }
.options li { padding: 14px 16px; margin-bottom: 8px; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; font-size: 16px; line-height: 1.6; background: #fff; transition: all .15s; }
.options li:active { transform: scale(0.98); }
.options li.selected { border-color: #4a90d9; background: #eef4fd; }
.options li.correct { border-color: #5cb85c; background: #e8f5e9; color: #2e7d32; }
.options li.wrong { border-color: #d9534f; background: #fdecea; color: #c62828; }
.options li.disabled { pointer-events: none; opacity: 0.85; }
.options li .letter { font-weight: bold; margin-right: 8px; color: #666; }
.options li.correct .letter { color: #2e7d32; }
.options li.wrong .letter { color: #c62828; }

.fill-area { margin: 16px 0; }
.fill-input { width: 100%; padding: 14px 16px; font-size: 17px; border: 2px solid #e0e0e0; border-radius: 12px; outline: none; background: #fff; transition: border-color .2s; }
.fill-input:focus { border-color: #4a90d9; }
.fill-input.correct { border-color: #5cb85c; background: #e8f5e9; color: #2e7d32; }
.fill-input.wrong { border-color: #d9534f; background: #fdecea; color: #c62828; }
.fill-input:disabled { opacity: 0.85; }

.feedback { padding: 14px 16px; border-radius: 12px; margin: 12px 0; font-size: 15px; line-height: 1.6; display: none; }
.feedback.show { display: block; }
.feedback.correct { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.feedback.wrong { background: #fdecea; color: #c62828; border: 1px solid #ef9a9a; }

/* ===== Post-answer actions ===== */
.post-actions { display: flex; gap: 8px; margin: 8px 0; }
.post-actions button { flex: 1; padding: 10px 8px; font-size: 13px; border: 2px solid; border-radius: 8px; cursor: pointer; font-weight: 500; background: #fff; }
.btn-remove-wrong { border-color: #5cb85c; color: #5cb85c; }
.btn-remove-wrong:active { background: #e8f5e9; }
.btn-star-toggle { border-color: #9b59b6; color: #9b59b6; }
.btn-star-toggle:active { background: #f3e5f5; }
.btn-star-toggle.starred { background: #9b59b6; color: #fff; }

/* ===== Bottom nav ===== */
.nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #eee; padding: 8px 12px; padding-bottom: max(8px, env(safe-area-inset-bottom)); z-index: 20; }
.nav-slider { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.nav-slider .slider-label { font-size: 12px; color: #999; min-width: 28px; text-align: center; }
.nav-slider input[type=range] { flex: 1; height: 4px; -webkit-appearance: none; appearance: none; background: #e0e0e0; border-radius: 2px; outline: none; }
.nav-slider input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #4a90d9; cursor: pointer; }
.nav-slider input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #4a90d9; border: none; cursor: pointer; }
.nav-btns { display: flex; gap: 8px; }
.nav-btns button { flex: 1; padding: 12px; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: 500; -webkit-appearance: none; }
.nav-btns button:active { transform: scale(0.97); }
.btn-prev { background: #e0e0e0; color: #555; }
.btn-next { background: #4a90d9; color: #fff; }
.btn-next.wrong-mode { background: #f0ad4e; }
.btn-nav-confirm { background: #f0ad4e; color: #fff; }
.btn-nav-confirm:active { background: #e6970c; }
.btn-menu { background: none; color: #999; border: 1px solid #ddd !important; font-size: 13px !important; flex: 0.5 !important; }

/* ===== Result ===== */
.result { max-width: 500px; margin: 0 auto; padding: 40px 16px; text-align: center; }
.result h1 { font-size: 24px; margin-bottom: 16px; }
.result .score { font-size: 48px; font-weight: bold; color: #4a90d9; margin: 20px 0; }
.result .detail { color: #888; font-size: 15px; line-height: 2; margin-bottom: 32px; }

/* ===== Search ===== */
.search-page { max-width: 500px; margin: 0 auto; padding: 12px; padding-bottom: 80px; }
.search-input { width: 100%; padding: 14px 16px; font-size: 16px; border: 2px solid #e0e0e0; border-radius: 12px; outline: none; background: #fff; transition: border-color .2s; position: sticky; top: 0; z-index: 5; }
.search-input:focus { border-color: #4a90d9; }
.search-results { margin-top: 12px; }
.search-item { padding: 14px 16px; background: #fff; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e8e8e8; cursor: pointer; transition: all .15s; }
.search-item:active { transform: scale(0.98); background: #f5f5f5; }
.search-item .si-type { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; color: #fff; margin-bottom: 6px; }
.search-item .si-stem { font-size: 15px; line-height: 1.6; color: #333; }
.search-item .si-starred { float: right; color: #9b59b6; font-size: 14px; }
.search-count { text-align: center; color: #999; font-size: 13px; padding: 8px 0; }

.loading { text-align: center; padding: 80px 20px; color: #999; font-size: 16px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===== State =====
let code = '';
let questions = [];
let wrongIds = new Set();
let fillWrongIds = new Set();
let starIds = new Set();
let currentList = [];
let currentIndex = 0;
let mode = '';
let answered = false;
let selectedOptions = new Set();
let stats = { total: 0, correct: 0 };

// ===== History management =====
let historyPushed = false;
let inPopstate = false;

function navigate(fn) {
  if (!inPopstate) {
    if (historyPushed) history.pushState({}, '');
    else historyPushed = true;
  }
  fn();
}

window.addEventListener('popstate', () => {
  inPopstate = true;
  if (mode && mode !== 'menu') {
    saveProgress();
    showMenu();
  } else {
    showLogin();
  }
  inPopstate = false;
});

function saveProgress() {
  if (mode === 'seq') api('/api/progress', { method: 'POST', body: JSON.stringify({ seqIndex: currentIndex }) });
  if (mode === 'fill') api('/api/fill-progress', { method: 'POST', body: JSON.stringify({ fillIndex: currentIndex }) });
}

// ===== API helpers =====
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', 'x-code': encodeURIComponent(code) };
  const res = await fetch(path, { ...opts, headers: { ...headers, ...opts.headers } });
  return res.json();
}

async function loadWrongIds() {
  const data = await api('/api/wrong');
  wrongIds = new Set(data.wrongIds || []);
}

async function syncWrong(add = [], remove = []) {
  for (const id of add) wrongIds.add(id);
  for (const id of remove) wrongIds.delete(id);
  await api('/api/wrong', { method: 'POST', body: JSON.stringify({ add, remove }) });
}

async function loadFillWrongIds() {
  const data = await api('/api/fill-wrong');
  fillWrongIds = new Set(data.fillWrongIds || []);
}

async function syncFillWrong(add = [], remove = []) {
  for (const id of add) fillWrongIds.add(id);
  for (const id of remove) fillWrongIds.delete(id);
  await api('/api/fill-wrong', { method: 'POST', body: JSON.stringify({ add, remove }) });
}

async function loadStarIds() {
  const data = await api('/api/star');
  starIds = new Set(data.starIds || []);
}

async function syncStar(add = [], remove = []) {
  for (const id of add) starIds.add(id);
  for (const id of remove) starIds.delete(id);
  await api('/api/star', { method: 'POST', body: JSON.stringify({ add, remove }) });
}

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
  return arr;
}

function typeCls(type) {
  return type === '单选题' ? 'type-single' : type === '多选题' ? 'type-multi' : type === '判断题' ? 'type-judge' : 'type-fill';
}

// ===== Login =====
function showLogin() {
  mode = '';
  code = '';
  historyPushed = false;
  document.getElementById('app').innerHTML = `
    <div class="login">
      <h1>刷题工具</h1>
      <div class="sub">输入暗号开始刷题</div>
      <input id="codeInput" type="text" placeholder="输入你的暗号" autocomplete="off" autofocus>
      <button onclick="doLogin()">进入</button>
      <div class="error" id="loginError"></div>
      <div class="hint">首次使用输入新暗号即可自动创建<br>不同暗号的错题库相互隔离</div>
    </div>
  `;
  document.getElementById('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

async function doLogin() {
  const input = document.getElementById('codeInput').value.trim();
  if (input.length < 2) {
    const err = document.getElementById('loginError');
    err.textContent = '暗号至少2个字符';
    err.style.display = 'block';
    return;
  }
  try {
    const data = await api('/api/login', { method: 'POST', body: JSON.stringify({ code: input }) });
    if (data.ok) {
      code = input;
      navigate(() => showMenu());
    }
  } catch {
    const err = document.getElementById('loginError');
    err.textContent = '连接失败，请检查服务是否启动';
    err.style.display = 'block';
  }
}

// ===== Menu =====
async function showMenu() {
  mode = 'menu';
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">加载中...</div>';
  try {
    await Promise.all([loadWrongIds(), loadStarIds(), loadFillWrongIds()]);
    const [statsData, prog] = await Promise.all([api('/api/stats'), api('/api/progress')]);
    const seqIdx = prog.seqIndex || 0;
    const seqLabel = seqIdx > 0 ? `顺序练习（继续第 ${seqIdx + 1} 题）` : '顺序练习';
    app.innerHTML = `
      <div class="menu">
        <h1>刷题工具</h1>
        <div class="user-info">
          暗号：<span class="code">${code}</span><br>
          题库 ${statsData.totalQuestions} 题 · 错题 ${wrongIds.size} 题 · 标星 ${starIds.size} 题
        </div>
        <button class="btn-seq" onclick="navQuiz('seq')">${seqLabel}</button>
        <button class="btn-rand" onclick="navQuiz('rand')">随机练习</button>
        <button class="btn-wrong" onclick="navQuiz('wrong')" ${wrongIds.size === 0 ? 'disabled' : ''}>错题回顾 (${wrongIds.size})</button>
        <button class="btn-star" onclick="navQuiz('star')" ${starIds.size === 0 ? 'disabled' : ''}>标星复习 (${starIds.size})</button>
        <button class="btn-fill" onclick="navQuiz('fill')">填空题专练</button>
        <button class="btn-fill-wrong" onclick="navQuiz('fillWrong')" ${fillWrongIds.size === 0 ? 'disabled' : ''}>填空错题 (${fillWrongIds.size})</button>
        <button class="btn-search" onclick="navigate(() => showSearch())">搜索题目</button>
        ${wrongIds.size > 0 ? '<button class="btn-clear" id="btnClear" onclick="clearWrong()">清空错题库</button>' : ''}
        ${fillWrongIds.size > 0 ? '<button class="btn-clear" id="btnClearFill" onclick="clearFillWrong()" style="background:#e67e22">清空填空错题</button>' : ''}
        <button class="btn-logout" onclick="showLogin()">切换暗号</button>
      </div>
    `;
  } catch {
    showLogin();
  }
}

function navQuiz(m) {
  navigate(() => startQuiz(m));
}

// ===== Quiz =====
async function startQuiz(m) {
  mode = m;
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">加载题目...</div>';
  try {
    if (!questions.length) questions = await api('/api/questions');
    await Promise.all([loadWrongIds(), loadStarIds(), loadFillWrongIds()]);

    if (m === 'seq') {
      currentList = [...questions];
      const prog = await api('/api/progress');
      currentIndex = Math.min(prog.seqIndex || 0, currentList.length - 1);
    } else if (m === 'rand') {
      currentList = shuffle(questions);
      currentIndex = 0;
    } else if (m === 'wrong') {
      currentList = shuffle(questions.filter(q => wrongIds.has(q.id)));
      if (!currentList.length) { navigate(() => showMenu()); return; }
      currentIndex = 0;
    } else if (m === 'star') {
      currentList = shuffle(questions.filter(q => starIds.has(q.id)));
      if (!currentList.length) { navigate(() => showMenu()); return; }
      currentIndex = 0;
    } else if (m === 'fill') {
      currentList = shuffle(questions.filter(q => q.type === '填空题'));
      if (!currentList.length) { app.innerHTML = '<div class="loading">没有填空题</div>'; return; }
      const prog = await api('/api/fill-progress');
      currentIndex = Math.min(prog.fillIndex || 0, currentList.length - 1);
    } else if (m === 'fillWrong') {
      currentList = shuffle(questions.filter(q => fillWrongIds.has(q.id)));
      if (!currentList.length) { navigate(() => showMenu()); return; }
      currentIndex = 0;
    }
    stats = { total: 0, correct: 0 };
    renderQuestion();
  } catch {
    app.innerHTML = '<div class="loading">加载失败，请重试</div>';
  }
}

function renderQuestion() {
  if (currentIndex >= currentList.length) { showResult(); return; }
  answered = false;
  selectedOptions.clear();
  const q = currentList[currentIndex];
  const pct = ((currentIndex + 1) / currentList.length * 100).toFixed(1);
  const isMulti = q.type === '多选题';
  const isFill = q.type === '填空题';

  let barClass = '';
  if (mode === 'star') barClass = ' star';
  else if (mode === 'fill' || mode === 'fillWrong') barClass = ' fill';

  let bodyHtml;
  if (isFill) {
    bodyHtml = `<div class="fill-area"><input class="fill-input" id="fillInput" type="text" placeholder="请输入答案" autocomplete="off"></div>`;
  } else {
    bodyHtml = `<ul class="options" id="options">${q.options.map((opt, i) => `
      <li data-index="${i}" onclick="${isMulti ? 'toggleOption(this)' : 'selectOption(this)'}">
        <span class="letter">${opt.letter}.</span>${opt.text}
      </li>`).join('')}</ul>`;
  }

  const showPostActions = (mode === 'wrong' || mode === 'fillWrong');
  const isStarred = starIds.has(q.id);

  document.getElementById('app').innerHTML = `
    <div class="quiz">
      <div class="progress-bar"><div class="progress-fill${barClass}" style="width:${pct}%"></div></div>
      <div class="progress-text">
        <span>${currentIndex + 1} / ${currentList.length}</span>
        <span>正确率 ${stats.total ? Math.round(stats.correct / stats.total * 100) : 0}% (${stats.correct}/${stats.total})</span>
      </div>
      <div class="q-header">
        <span class="q-type ${typeCls(q.type)}">${q.type}</span>
        <div class="q-stem">${q.stem}</div>
      </div>
      ${bodyHtml}
      <div class="feedback" id="feedback"></div>
      <div class="post-actions" id="postActions" style="display:none">
        <button class="btn-remove-wrong" onclick="removeFromWrong()">从错题库移除</button>
        <button class="btn-star-toggle${isStarred ? ' starred' : ''}" id="btnStarToggle" onclick="toggleStar()">${isStarred ? '已标星' : '标星'}</button>
      </div>
    </div>
    <div class="nav-bar">
      <div class="nav-slider">
        <span class="slider-label">1</span>
        <input type="range" id="questionSlider" min="1" max="${currentList.length}" value="${currentIndex + 1}" oninput="jumpToQuestion(this.value - 1)">
        <span class="slider-label">${currentList.length}</span>
      </div>
      <div class="nav-btns">
        <button class="btn-menu" onclick="goBack()">菜单</button>
        <button class="btn-prev" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled style="opacity:0.4"' : ''}>&lt;</button>
        ${!answered && (isMulti || isFill) ? `<button class="btn-nav-confirm" id="btnConfirm" onclick="${isFill ? 'submitFill()' : 'submitAnswer()'}">确认</button>` : ''}
        <button class="btn-next ${mode === 'wrong' || mode === 'fillWrong' ? 'wrong-mode' : ''}" onclick="nextQuestion()" ${currentIndex >= currentList.length - 1 ? 'disabled style="opacity:0.4"' : ''}>&gt;</button>
      </div>
    </div>`;
  if (isFill) document.getElementById('fillInput').focus();
}

function goBack() {
  saveProgress();
  history.back();
}

function removeFromWrong() {
  const q = currentList[currentIndex];
  if (mode === 'fillWrong') {
    syncFillWrong([], [q.id]);
    fillWrongIds.delete(q.id);
  } else {
    syncWrong([], [q.id]);
    wrongIds.delete(q.id);
  }
  const btn = document.querySelector('.btn-remove-wrong');
  btn.textContent = '已移除';
  btn.disabled = true;
  btn.style.opacity = '0.5';
}

function toggleStar() {
  const q = currentList[currentIndex];
  const btn = document.getElementById('btnStarToggle');
  if (starIds.has(q.id)) {
    syncStar([], [q.id]);
    starIds.delete(q.id);
    btn.textContent = '标星';
    btn.classList.remove('starred');
  } else {
    syncStar([q.id], []);
    starIds.add(q.id);
    btn.textContent = '已标星';
    btn.classList.add('starred');
  }
}

function showPostActionsIfWrongMode() {
  if (mode === 'wrong' || mode === 'fillWrong') {
    document.getElementById('postActions').style.display = 'flex';
  }
}

function toggleOption(el) {
  if (answered) return;
  const idx = parseInt(el.dataset.index);
  if (selectedOptions.has(idx)) { selectedOptions.delete(idx); el.classList.remove('selected'); }
  else { selectedOptions.add(idx); el.classList.add('selected'); }
  const btn = document.getElementById('btnConfirm');
  if (btn) btn.style.display = selectedOptions.size > 0 ? 'block' : 'none';
}

function selectOption(el) {
  if (answered) return;
  answered = true;
  selectedOptions.add(parseInt(el.dataset.index));
  checkAnswer();
}

function submitAnswer() {
  if (answered || selectedOptions.size === 0) return;
  answered = true;
  checkAnswer();
}

function submitFill() {
  if (answered) return;
  const input = document.getElementById('fillInput');
  if (!input.value.trim()) return;
  answered = true;
  checkFillAnswer(input.value.trim());
}

function checkAnswer() {
  const q = currentList[currentIndex];
  const els = document.querySelectorAll('#options li');
  const correct = new Set();
  q.options.forEach((o, i) => { if (o.correct) correct.add(i); });

  let isRight;
  if (q.type === '多选题') {
    isRight = selectedOptions.size === correct.size && [...selectedOptions].every(i => correct.has(i));
  } else {
    isRight = correct.has([...selectedOptions][0]);
  }

  stats.total++;
  if (isRight) { stats.correct++; syncWrong([], [q.id]); }
  else { syncWrong([q.id], []); }

  els.forEach((el, i) => {
    el.classList.add('disabled');
    if (correct.has(i)) el.classList.add('correct');
    if (selectedOptions.has(i) && !correct.has(i)) el.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  const letters = q.options.filter(o => o.correct).map(o => o.letter).join('');
  if (isRight) { fb.className = 'feedback show correct'; fb.textContent = '回答正确！'; }
  else { fb.className = 'feedback show wrong'; fb.innerHTML = `回答错误！正确答案：${letters}`; }

  if (document.getElementById('btnConfirm')) document.getElementById('btnConfirm').style.display = 'none';
  showPostActionsIfWrongMode();
}

function checkFillAnswer(userInput) {
  const q = currentList[currentIndex];
  const input = document.getElementById('fillInput');
  input.disabled = true;
  const normalize = s => s.replace(/\s+/g, '').replace(/（/g, '(').replace(/）/g, ')');
  const isRight = normalize(userInput) === normalize(q.correctAnswer);

  stats.total++;
  if (isRight) { stats.correct++; input.classList.add('correct'); }
  else { input.classList.add('wrong'); }

  if (mode === 'fill' || mode === 'fillWrong') {
    if (isRight) syncFillWrong([], [q.id]); else syncFillWrong([q.id], []);
  } else {
    if (isRight) syncWrong([], [q.id]); else syncWrong([q.id], []);
  }

  const fb = document.getElementById('feedback');
  if (isRight) { fb.className = 'feedback show correct'; fb.textContent = '回答正确！'; }
  else { fb.className = 'feedback show wrong'; fb.innerHTML = `回答错误！正确答案：${q.correctAnswer}`; }

  if (document.getElementById('btnConfirm')) document.getElementById('btnConfirm').style.display = 'none';
  showPostActionsIfWrongMode();
}

function prevQuestion() {
  if (currentIndex > 0) { currentIndex--; renderQuestion(); }
}

function nextQuestion() {
  if (currentIndex < currentList.length - 1) { currentIndex++; renderQuestion(); }
  else showResult();
}

function jumpToQuestion(idx) {
  currentIndex = idx;
  saveProgress();
  renderQuestion();
}

function showResult() {
  const pct = stats.total ? Math.round(stats.correct / stats.total * 100) : 0;
  if (mode === 'seq') api('/api/progress', { method: 'POST', body: JSON.stringify({ seqIndex: 0 }) });
  if (mode === 'fill') api('/api/fill-progress', { method: 'POST', body: JSON.stringify({ fillIndex: 0 }) });
  let nextBtn = '';
  if (mode === 'wrong' && wrongIds.size > 0) {
    nextBtn = `<button class="btn-wrong" style="width:100%;padding:16px;font-size:17px;border:none;border-radius:12px;color:#fff;cursor:pointer;margin-bottom:12px" onclick="navQuiz('wrong')">继续练习错题 (${wrongIds.size})</button>`;
  } else if (mode === 'fillWrong' && fillWrongIds.size > 0) {
    nextBtn = `<button class="btn-fill-wrong" style="width:100%;padding:16px;font-size:17px;border:none;border-radius:12px;color:#fff;cursor:pointer;margin-bottom:12px" onclick="navQuiz('fillWrong')">继续填空错题 (${fillWrongIds.size})</button>`;
  }
  document.getElementById('app').innerHTML = `
    <div class="result">
      <h1>练习完成</h1>
      <div class="score">${pct}%</div>
      <div class="detail">共 ${stats.total} 题<br>正确 ${stats.correct} 题 · 错误 ${stats.total - stats.correct} 题</div>
      <button class="btn-seq" style="width:100%;padding:16px;font-size:17px;border:none;border-radius:12px;color:#fff;cursor:pointer" onclick="showMenu()">返回菜单</button>
      ${nextBtn}
    </div>`;
}

function confirmClear(btn, label, onConfirm) {
  if (btn.dataset.pending) {
    clearTimeout(parseInt(btn.dataset.pending));
    delete btn.dataset.pending;
    btn.textContent = label;
    btn.classList.remove('confirm');
    onConfirm();
  } else {
    btn.textContent = '再次点击确认清空';
    btn.classList.add('confirm');
    btn.dataset.pending = setTimeout(() => {
      delete btn.dataset.pending;
      btn.textContent = label;
      btn.classList.remove('confirm');
    }, 3000);
  }
}
function clearWrong() {
  confirmClear(document.getElementById('btnClear'), '清空错题库', () => {
    api('/api/wrong', { method: 'DELETE' }).then(() => { wrongIds.clear(); showMenu(); });
  });
}
function clearFillWrong() {
  confirmClear(document.getElementById('btnClearFill'), '清空填空错题', () => {
    api('/api/fill-wrong', { method: 'DELETE' }).then(() => { fillWrongIds.clear(); showMenu(); });
  });
}

// ===== Search =====
function showSearch() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="search-page">
      <input class="search-input" id="searchInput" type="text" placeholder="输入关键词搜索题目..." autocomplete="off" autofocus>
      <div class="search-count" id="searchCount"></div>
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="nav-bar">
      <div class="nav-btns">
        <button class="btn-menu" onclick="goBack()">返回菜单</button>
      </div>
    </div>`;

  const input = document.getElementById('searchInput');
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => doSearch(input.value.trim()), 200);
  });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(input.value.trim()); });
}

async function doSearch(keyword) {
  if (!questions.length) questions = await api('/api/questions');
  const resultsEl = document.getElementById('searchResults');
  const countEl = document.getElementById('searchCount');

  if (!keyword) {
    resultsEl.innerHTML = '';
    countEl.textContent = '';
    return;
  }

  const kw = keyword.toLowerCase();
  const results = questions.filter(q => {
    if (q.stem.toLowerCase().includes(kw)) return true;
    if (q.options && q.options.some(o => o.text && o.text.toLowerCase().includes(kw))) return true;
    if (q.correctAnswer && q.correctAnswer.toLowerCase().includes(kw)) return true;
    return false;
  }).slice(0, 50);
  countEl.textContent = `找到 ${results.length} 题`;

  resultsEl.innerHTML = results.map((q, i) => `
    <div class="search-item" onclick="openSearchQuestion(${questions.indexOf(q)})">
      ${starIds.has(q.id) ? '<span class="si-starred">★</span>' : ''}
      <span class="si-type ${typeCls(q.type)}">${q.type}</span>
      <div class="si-stem">${q.stem.slice(0, 120)}${q.stem.length > 120 ? '...' : ''}</div>
    </div>
  `).join('');
}

function openSearchQuestion(idx) {
  navigate(() => {
    mode = 'search';
    currentList = [questions[idx]];
    currentIndex = 0;
    stats = { total: 0, correct: 0 };
    renderQuestion();
  });
}

// ===== Init =====
showLogin();
